name: Refresh stats badges

# Self-hosted shields.io endpoint badges: this job pulls per-skill download
# counts from ClawHub + SkillHub (and the skills.sh aggregate) and writes
# badges/*.json, which the README renders via img.shields.io/endpoint. Badges
# are as fresh as the last run (daily) — a transient fetch failure keeps the
# prior committed value rather than zeroing the badge.

on:
  schedule:
    - cron: "17 6 * * *"   # daily 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: stats-badges
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate badge JSONs
        run: python3 scripts/stats-dashboard.py --badges badges

      - name: Commit if changed
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain badges/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add badges/
            git commit -m "chore(badges): refresh registry download stats [skip ci]"
            git push
          else
            echo "no badge changes"
          fi

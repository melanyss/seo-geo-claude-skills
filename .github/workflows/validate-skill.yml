name: Validate Agent Skill

on:
  push:
    branches: [main]
    paths:
      - "**/SKILL.md"
      - "**/references/**"
      - "references/**"
      - "commands/**"
      - "evals/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/repo-about.json"
      - ".claude-plugin/**"
      - "docs/**"
      - "hooks/**"
      - "memory/**"
      - ".gitignore"
      - "README.md"
      - "CLAUDE.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "CONNECTORS.md"
      - "PRIVACY.md"
      - "SECURITY.md"
      - "VERSIONS.md"
      - "marketplace.json"
      - "openclaw.plugin.json"
      - "skills.sh.json"
      - "docs/mcp-catalog.json"
  pull_request:
    branches: [main]
    paths:
      - "**/SKILL.md"
      - "**/references/**"
      - "references/**"
      - "commands/**"
      - "evals/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/repo-about.json"
      - ".claude-plugin/**"
      - "docs/**"
      - "hooks/**"
      - "memory/**"
      - ".gitignore"
      - "README.md"
      - "CLAUDE.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "CONNECTORS.md"
      - "PRIVACY.md"
      - "SECURITY.md"
      - "VERSIONS.md"
      - "marketplace.json"
      - "openclaw.plugin.json"
      - "skills.sh.json"
      - "docs/mcp-catalog.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all skills
        run: |
          set -euo pipefail
          find seo-geo/research seo-geo/build seo-geo/optimize seo-geo/monitor protocol \
            influencer/discover influencer/plan influencer/activate influencer/measure \
            ad/research ad/orchestrate ad/activate ad/scale \
            email/setup email/engage email/nurture email/deliver \
            launch/research launch/assemble launch/mobilize launch/prove \
            social/explore social/craft social/host social/observe \
            narrative/trace narrative/architect narrative/land narrative/evaluate \
            -mindepth 2 -maxdepth 2 -name SKILL.md \
            -print | sort | while read -r file; do
            bash scripts/validate-skill.sh "$(dirname "$file")"
          done
          bash scripts/validate-skill.sh --status

      - name: Root references/ blob-main guard
        run: |
          # Repo-level half of the documented blob/main ban: the per-skill validator
          # scans each skill's SKILL.md + references/, but cannot see root references/.
          # `!` must stay the last command — under bash -e an inverted failure does not
          # abort the script, so a trailing echo would mask a hit.
          ! grep -rn "blob/main" references/ --include="*.md"

      - name: Lint connector code (py_compile)
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/*.py scripts/connectors/*.py
          echo "all Python helpers compile clean"

      - name: Deterministic behavior conformance
        run: python3 scripts/run-behavior-evals.py

      - name: PII / secret scan
        run: python3 scripts/check-pii.py

      - name: Dependency-creep guard (stdlib-only)
        run: bash scripts/check-stdlib-only.sh

      - name: Version-sync guard (10 tracking surfaces)
        run: bash scripts/check-versions.sh

      - name: Cross-agent discovery guard (npx skills)
        run: |
          set -euo pipefail
          # End-to-end guard for the 70+ SKILL.md hosts served by `npx skills`
          # (see docs/agent-compatibility.md): the installer must discover every
          # skill declared in plugin.json. Catches invalid frontmatter YAML and
          # manifest drift in one shot — a skill the installer cannot see is a
          # skill no non-Claude host can install.
          declared=$(python3 -c "import json; print(len(json.load(open('.claude-plugin/plugin.json'))['skills']))")
          found=$(npx -y skills add . --list 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | grep -oE 'Found [0-9]+ skill' | grep -oE '[0-9]+' | head -1 || true)
          echo "declared=$declared found=${found:-none}"
          [ "${found:-0}" = "$declared" ]

      - name: Validate JSON / shell manifests
        run: |
          set -euo pipefail
          for f in .claude-plugin/plugin.json marketplace.json .claude-plugin/marketplace.json openclaw.plugin.json \
            docs/mcp-catalog.json skills.sh.json references/system-catalog.json \
            references/system-catalog.schema.json references/framework-catalog.json \
            references/framework-catalog.schema.json references/audit-run.schema.json \
            references/audit-artifact.schema.json references/c3-rollup.schema.json \
            references/registry-event.schema.json \
            evals/deterministic-suites.json evals/behavior-adapter.schema.json; do
            python3 -c "import json,sys; json.load(open('$f')); print('ok: $f')"
          done
          # skills.sh.json (registry page groupings) must cover exactly the
          # declared skill set — a skill missing from every grouping renders
          # ungrouped at the bottom of https://skills.sh/aaron-he-zhu/aaron-marketing-skills
          python3 - <<'PYEOF'
          import json
          cfg = json.load(open('skills.sh.json'))
          declared = {p.split('/')[-1] for p in json.load(open('.claude-plugin/plugin.json'))['skills']}
          grouped_list = [s for g in cfg['groupings'] for s in g['skills']]
          grouped = set(grouped_list)
          assert len(cfg['groupings']) <= 50
          for g in cfg['groupings']:
              assert 1 <= len(g['title']) <= 120 and len(g.get('description', '')) <= 500
              assert 1 <= len(g['skills']) <= 500
          assert len(grouped_list) == len(grouped), f"duplicate slugs: {sorted(s for s in grouped if grouped_list.count(s) > 1)}"
          assert grouped == declared, f"missing: {sorted(declared - grouped)} unknown: {sorted(grouped - declared)}"
          print(f"ok: skills.sh.json groupings cover {len(grouped)}/{len(declared)} declared skills")
          PYEOF
          # the two marketplace.json files must stay byte-identical mirrors
          diff -q marketplace.json .claude-plugin/marketplace.json
          # hook script must parse
          bash -n hooks/claude-hook.sh && echo "hooks/claude-hook.sh parses"
          python3 -c "import json; json.load(open('hooks/hooks.json')); print('ok: hooks/hooks.json')"

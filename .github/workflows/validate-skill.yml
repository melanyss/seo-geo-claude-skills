name: Validate Agent Skill

on:
  push:
    branches: [main]
    paths:
      - "**/SKILL.md"
      - "**/references/**"
      - "references/**"
      - "commands/**"
      - "evals/**"
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".claude-plugin/**"
      - "docs/**"
      - "hooks/**"
      - "memory/**"
      - ".gitignore"
      - "README.md"
      - "CLAUDE.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "CONNECTORS.md"
      - "VERSIONS.md"
      - "marketplace.json"
      - ".mcp.json"
  pull_request:
    branches: [main]
    paths:
      - "**/SKILL.md"
      - "**/references/**"
      - "references/**"
      - "commands/**"
      - "evals/**"
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".claude-plugin/**"
      - "docs/**"
      - "hooks/**"
      - "memory/**"
      - ".gitignore"
      - "README.md"
      - "CLAUDE.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "CONNECTORS.md"
      - "VERSIONS.md"
      - "marketplace.json"
      - ".mcp.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all skills
        run: |
          set -euo pipefail
          find research build optimize monitor cross-cutting \
            -mindepth 2 -maxdepth 2 -name SKILL.md \
            -print | sort | while read -r file; do
            bash scripts/validate-skill.sh "$(dirname "$file")"
          done
          bash scripts/validate-skill.sh --status

      - name: Lint connector code (py_compile)
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/connectors/*.py scripts/golden-auditor-math.py
          echo "connectors compile clean"

      - name: Golden auditor-math check
        run: python3 scripts/golden-auditor-math.py

      - name: Validate JSON / shell manifests
        run: |
          set -euo pipefail
          for f in .claude-plugin/plugin.json marketplace.json .claude-plugin/marketplace.json .mcp.json; do
            python3 -c "import json,sys; json.load(open('$f')); print('ok: $f')"
          done
          # the two marketplace.json files must stay byte-identical mirrors
          diff -q marketplace.json .claude-plugin/marketplace.json
          # hook script must parse
          bash -n hooks/claude-hook.sh && echo "hooks/claude-hook.sh parses"
          python3 -c "import json; json.load(open('hooks/hooks.json')); print('ok: hooks/hooks.json')"

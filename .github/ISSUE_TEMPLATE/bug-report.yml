name: Bug report
description: Report a defect in a skill, command, the validator, a connector, or the docs.
title: "[bug] <short summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. This plugin is content (Markdown skills) plus a small bash validator and zero-dependency Python connectors. Please point at the exact file and line where you can.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the plugin is affected?
      options:
        - A skill (SKILL.md)
        - A command (commands/*.md)
        - Validator (scripts/validate-skill.sh)
        - Connector script (scripts/connectors/*.py)
        - Hook (hooks/claude-hook.sh)
        - Reference / framework doc (references/*)
        - Docs (README / CONNECTORS / CONTRIBUTING / etc.)
        - Other
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: File and line
      description: e.g. `optimize/on-page-seo-auditor/SKILL.md:3` or `scripts/connectors/crawl.py:103`
      placeholder: path/to/file.md:42
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you observed — wrong output, a validator failure, a broken link, an incorrect veto ID, etc.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the command you ran (e.g. `./scripts/validate-skill.sh <skill>`) and any output.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Bundle version
      description: From plugin.json / the README badge.
      placeholder: 10.0.0
    validations:
      required: false
